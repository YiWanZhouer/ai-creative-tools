<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>AI 创意工具箱</title>
<style>
  :root {
    --bg: #1a1b26;
    --bg-card: #222433;
    --text: #c8c9d8;
    --text-dim: #8a8ba0;
    --border: rgba(255,255,255,0.06);

    /* 功能色 —— 同调约束：S 38-43%, L 55-65% (暗色模式) */
    --accent: #7b8cff;
    --accent-dim: rgba(123,140,255,0.12);
    --accent-glow: rgba(123,140,255,0.25);
    --dominant: #d4956b;
    --dominant-dim: rgba(212,149,107,0.12);
    --dominant-glow: rgba(212,149,107,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 页头 ── */
  .header {
    text-align: center;
    padding: 56px 20px 40px;
    width: 100%;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: .02em;
    color: #e2e0ed;
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: .04em;
  }

  /* ── 工具卡片区 ── */
  .tools {
    width: 100%;
    max-width: 580px;
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── 步骤连接线 ── */
  .step-connector {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    position: relative;
  }
  .step-connector::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(
      180deg,
      var(--accent-glow) 0%,
      var(--dominant-glow) 100%
    );
  }
  .step-arrow {
    position: relative;
    z-index: 1;
    font-size: 16px;
    color: #555;
    background: var(--bg);
    padding: 0 8px;
  }

  /* ── 卡片 ── */
  .tool-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    position: relative;
    transition: transform .2s, box-shadow .2s, border-color .2s;
    overflow: hidden;
  }
  .tool-card:hover {
    transform: translateY(-2px);
  }
  .tool-card:active {
    transform: translateY(0);
  }

  /* 卡片顶部色条 */
  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  /* 步骤编号 */
  .step-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .tool-card .icon {
    font-size: 28px;
    margin-bottom: 8px;
    line-height: 1;
  }
  .tool-card h2 {
    font-size: 18px;
    font-weight: 600;
    color: #e2e0ed;
    margin-bottom: 4px;
  }
  .tool-card h2 .ver {
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    letter-spacing: .04em; font-family: "SF Mono", "Fira Code", monospace;
    margin-left: 6px; opacity: .6;
  }
  .tool-card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  /* ── 方案骨架生成器（第一步，accent 色系）── */
  .card-skeleton {
    border-color: rgba(123,140,255,0.15);
  }
  .card-skeleton::before {
    background: var(--accent);
  }
  .card-skeleton:hover {
    border-color: rgba(123,140,255,0.35);
    box-shadow: 0 0 32px var(--accent-dim), 0 4px 20px rgba(0,0,0,0.3);
  }
  .card-skeleton .step-badge {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* ── 创意方案生成器（第二步，dominant 色系）── */
  .card-generator {
    border-color: rgba(212,149,107,0.15);
  }
  .card-generator::before {
    background: var(--dominant);
  }
  .card-generator:hover {
    border-color: rgba(212,149,107,0.35);
    box-shadow: 0 0 32px var(--dominant-dim), 0 4px 20px rgba(0,0,0,0.3);
  }
  .card-generator .step-badge {
    background: var(--dominant-dim);
    color: var(--dominant);
  }

  /* ── 页脚 ── */
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding-bottom: 48px;
  }
  .footer .repo {
    color: #555;
    font-size: 11px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI 创意工具箱</h1>
  <p class="subtitle">综艺策划 · 从骨架到方案</p>
</div>

<div class="tools">

  <!-- 第一步：方案骨架生成器 -->
  <a class="tool-card card-skeleton" href="方案骨架生成器.html">
    <span class="step-badge">1</span>
    <div class="icon">🏗️</div>
    <h2>方案骨架生成器<span class="ver">v1.13</span></h2>
    <p>八大维度 · 58 元素零件库 + 因果推导链 + 边界条件 —— 选元素，看它们怎么联动、在什么条件下失效，AI 帮你诊断矛盾</p>
  </a>

  <!-- 连接线 -->
  <div class="step-connector">
    <span class="step-arrow">↓</span>
  </div>

  <!-- 第二步：创意方案生成器 -->
  <a class="tool-card card-generator" href="创意方案生成器.html">
    <span class="step-badge">2</span>
    <div class="icon">💡</div>
    <h2>创意方案生成器<span class="ver">v2.4</span></h2>
    <p>四维设计矩阵 · 灵魂三问 · 矛盾诊断引擎 —— 输入一个概念，输出一份可直接汇报的方案，含致命缺陷检测</p>
  </a>

</div>

<div class="footer">
  <p>收藏此页，随时使用 ↑</p>
  <p class="repo">YiWanZhouer / ai-creative-tools</p>
</div>

</body>
</html>
